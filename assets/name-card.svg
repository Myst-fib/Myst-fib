  </g>

  <!-- name -->
  <text x="380" y="92" text-anchor="middle" class="title" font-size="30" fill="#AEC78F">
    Patrick Cantero
  </text>

  <!-- subtitle -->
  <text x="380" y="118" text-anchor="middle" class="subtitle" font-size="14" fill="#9CB080">
    Frontend Developer · Design → Code → Deploy
  </text>

  <!-- bottom dot row -->
  <g>
    <circle cx="338" cy="142" r="4" fill="#2B5748"/>
    <circle cx="356" cy="142" r="4" fill="#618764"/>
    <circle cx="374" cy="142" r="4" fill="#9CB080"/>
    <circle cx="392" cy="142" r="4" fill="#9CB080"/>
    <circle cx="410" cy="142" r="4" fill="#618764"/>
    <circle cx="428" cy="142" r="4" fill="#2B5748"/>
