<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="180" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'Fira Code', 'Courier New', monospace; font-weight: 700; }
      .subtitle { font-family: 'Fira Code', 'Courier New', monospace; font-weight: 400; }
    </style>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="758" height="178" rx="14" ry="14"
        fill="#182234" stroke="#9CB080" stroke-width="1.5"/>

  <!-- top dot row -->
  <g>
    <circle cx="338" cy="42" r="4" fill="#2B5748"/>
    <circle cx="356" cy="42" r="4" fill="#618764"/>
    <circle cx="374" cy="42" r="4" fill="#9CB080"/>
    <circle cx="392" cy="42" r="4" fill="#9CB080"/>
    <circle cx="410" cy="42" r="4" fill="#618764"/>
